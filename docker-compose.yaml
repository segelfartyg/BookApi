services:
  BookApiDB:
    image: mysql:latest
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: yes
      MYSQL_ROOT_PASSWORD: ''
  BookApiRedis:
    image: redis
    restart: always
    ports:
     - "6379:6379"
  BookApi:
    image: segelfartyg/bookapi
    restart: always
    ports:
     - "8080:8080"
    environment:
      DOTNET_ENVIRONMENT: "Development"
    depends_on:
      - BookApiDB
      - BookApiRedis